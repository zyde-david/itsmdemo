<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — IT Ticket System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#1a5276,#2c3e50);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.login-box h3{color:#1a5276;margin-bottom:8px}
.login-box .subtitle{color:#888;margin-bottom:24px;font-size:0.9rem}
.btn-login{background:linear-gradient(135deg,#1a5276,#2c3e50);border:none;width:100%;padding:10px;color:#fff;border-radius:8px}
.btn-login:hover{opacity:0.9;color:#fff}
</style>
</head>
<body>
<div class="login-box text-center">
    <i class="bi bi-bank2" style="font-size:2.5rem;color:#1a5276"></i>
    <h3 class="fw-bold">IT Ticket System</h3>
    <p class="subtitle">ระบบจัดการ IT — โปรแกรมสาธิต</p>
    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="รหัสผ่าน" required autofocus>
        </div>
        <button type="submit" class="btn btn-login fw-bold"><i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ</button>
    </form>
    <div class="mt-3 small text-muted">Demo สำหรับการสัมภาษณ์งาน</div>
</div>
</body>
</html>
